<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAMA Admin | لوحة لما المشرقة</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #A2D2FF; 
            --soft-green: #B9F3E4;   
            --bg-light: #FDFBF7;     
            --text-main: #4A4A4A;
            --accent-pink: #FFC2D1;
            --white: #ffffff;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, var(--bg-light) 0%, #ffffff 100%);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            color: var(--text-main);
        }

        /* --- شاشة تسجيل الدخول بتصميم زجاجي --- */
        #loginScreen {
            width: 90%; max-width: 400px; padding: 3rem; margin-top: 10vh;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border-radius: 40px; border: 2px solid var(--primary-blue);
            box-shadow: 0 20px 50px rgba(162, 210, 255, 0.2); text-align: center;
        }

        /* --- لوحة التحكم المتطورة --- */
        #adminDashboard {
            display: none; width: 95%; max-width: 1200px; margin: 30px auto;
            display: grid; grid-template-columns: 1fr 1.4fr; gap: 30px;
        }

        @media (max-width: 950px) { #adminDashboard { grid-template-columns: 1fr; } }

        .card { 
            background: var(--white); padding: 2.5rem; border-radius: 35px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.03); border: 1px solid rgba(162, 210, 255, 0.3);
            transition: 0.3s;
        }

        .logo-text { 
            font-size: 3.5rem; font-weight: 900; letter-spacing: 6px;
            background: linear-gradient(45deg, var(--primary-blue), var(--accent-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px; text-align: center;
        }

        .input-group { margin-bottom: 1.5rem; text-align: right; }
        label { display: block; margin-bottom: 10px; font-weight: 700; font-size: 0.95rem; color: #666; }
        
        input, select { 
            width: 100%; padding: 14px; border-radius: 18px; border: 2px solid #f0f4f8;
            background: #fbfcfe; transition: 0.3s; font-family: 'Tajawal'; font-size: 1rem;
        }
        input:focus { border-color: var(--primary-blue); outline: none; background: white; box-shadow: 0 0 15px rgba(162, 210, 255, 0.2); }

        .btn { 
            width: 100%; padding: 16px; border: none; border-radius: 20px; 
            font-weight: 900; cursor: pointer; transition: 0.3s; font-family: 'Tajawal'; font-size: 1.1rem;
        }
        .btn-blue { background: linear-gradient(45deg, var(--primary-blue), #8ECAE6); color: white; }
        .btn-green { background: linear-gradient(45deg, var(--soft-green), #98D8AA); color: #444; margin-top: 15px; }
        .btn-danger { background: #FF9B9B; color: white; padding: 8px 15px; width: auto; font-size: 0.85rem; border-radius: 12px; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* --- القوائم المرتبة --- */
        .scroll-area { max-height: 500px; overflow-y: auto; padding-right: 10px; }
        .list-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; background: #fdfdfd; border-radius: 20px; margin-bottom: 12px;
            border: 1px solid #f0f0f0; transition: 0.2s;
        }
        .list-item:hover { transform: scale(1.02); background: white; border-color: var(--primary-blue); }
        .item-preview { display: flex; align-items: center; gap: 15px; }
        .item-img { width: 55px; height: 55px; border-radius: 15px; object-fit: cover; box-shadow: 0 5px 10px rgba(0,0,0,0.05); }

        .stats-pill { 
            background: var(--white); padding: 10px 25px; border-radius: 50px; 
            display: inline-flex; align-items: center; gap: 12px; font-weight: 900;
            border: 2px solid var(--soft-green); margin-bottom: 25px; color: var(--text-main);
        }

        /* --- المربع النابض الختامي --- */
        .footer-box {
            margin: 50px 0; padding: 20px 40px; background: white;
            border-radius: 20px; border: 2px solid var(--accent-pink);
            box-shadow: 0 10px 30px rgba(255, 194, 209, 0.3);
            animation: pulse 2s infinite; text-align: center;
        }
        .footer-text { font-size: 1.4rem; font-weight: 900; color: var(--text-main); margin: 0; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 10px 30px rgba(255, 194, 209, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 15px 40px rgba(255, 194, 209, 0.5); }
            100% { transform: scale(1); box-shadow: 0 10px 30px rgba(255, 194, 209, 0.3); }
        }

        .loader { display:none; margin: 15px auto; width: 30px; height: 30px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="logo-text" style="font-size: 2.8rem;">LAMA</div>
    <p style="font-weight: bold; color: #aaa; margin-bottom: 25px;">مرحباً بك في عالم لما المشرق</p>
    <div class="input-group">
        <input type="password" id="adminPass" placeholder="رمز الدخول الخاص بطلال">
    </div>
    <button class="btn btn-blue" onclick="attemptLogin()">دخول للوحة التحكم</button>
</div>

<div id="adminDashboard" style="display: none;">
    <div class="side-panel">
        <div class="card">
            <div style="text-align: center;">
                <div class="stats-pill">
                    <span style="font-size: 1.4rem;">📱</span>
                    <span><span id="userCount">0</span> جهاز متصل</span>
                </div>
            </div>
            
            <h3 style="color: var(--primary-blue); text-align: right; margin-top: 0;">✨ إنشاء مجلد جديد</h3>
            <div class="input-group">
                <input type="text" id="folderName" placeholder="اسم المجلد (مثلاً: ألعابي)">
            </div>
            <div class="input-group">
                <label>🖼️ صورة غلاف المجلد</label>
                <input type="file" id="folderImage" accept="image/*">
            </div>
            <button class="btn btn-blue" onclick="createFolderWithImage()">اعتماد المجلد 📁</button>

            <hr style="border: 0; border-top: 1px dashed #ddd; margin: 30px 0;">

            <h3 style="color: #98D8AA; text-align: right;">🎨 إضافة بطاقة لـ "لما"</h3>
            <div class="input-group">
                <label>المجلد التابع</label>
                <select id="folderSelect"></select>
            </div>
            <div class="input-group">
                <input type="text" id="cardTitle" placeholder="اسم البطاقة (مثلاً: تفاحة)">
            </div>
            <div class="input-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>📸 الصورة</label><input type="file" id="cardImage" accept="image/*"></div>
                <div><label>🔊 الصوت</label><input type="file" id="cardAudio" accept="audio/*,video/*"></div>
            </div>
            <button class="btn btn-green" onclick="uploadCard()">نشر البطاقة السحابية 🚀</button>
            <div id="mainLoader" class="loader"></div>
        </div>
    </div>

    <div class="main-panel">
        <div class="card">
            <h3 style="color: var(--primary-blue); margin: 0 0 25px 0; text-align: center;">🔍 استعراض وإدارة المحتوى</h3>
            
            <label style="color: var(--primary-blue);">📁 مجلدات لما الحالية</label>
            <div id="catList" class="scroll-area"></div>

            <hr style="border: 0; border-top: 1px solid #f0f0f0; margin: 30px 0;">

            <label style="color: #98D8AA;">🃏 البطاقات المنشورة</label>
            <div id="cardList" class="scroll-area"></div>
        </div>
    </div>
</div>

<div class="footer-box" id="footerBox" style="display: none;">
    <p class="footer-text">وَمَا تَوْفِيقِي إِلَّا بِاللَّهِ</p>
</div>

<script>
    // --- إعدادات Firebase ---
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "aaa-app-usr.firebaseapp.com",
        projectId: "aaa-app-usr",
        storageBucket: "aaa-app-usr.appspot.com",
        appId: "1:73920829150:web:8b770c78afc13f97c1544f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const CLOUD_NAME = "dmj9rw7fx";
    const UPLOAD_PRESET = "tlal-1234";

    function attemptLogin() {
        if (document.getElementById('adminPass').value === "1234") {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'grid';
            document.getElementById('footerBox').style.display = 'block';
            startSystem();
        } else { alert("عذراً طلال، الرمز غير صحيح!"); }
    }

    function startSystem() {
        db.collection("analytics").doc("users_stats").onSnapshot(doc => {
            if(doc.exists) document.getElementById("userCount").innerText = doc.data().total_devices || 0;
        });

        db.collection("categories").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const select = document.getElementById("folderSelect");
            const catList = document.getElementById("catList");
            select.innerHTML = ""; catList.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                select.innerHTML += `<option value="${doc.id}">${data.name}</option>`;
                catList.innerHTML += `
                    <div class="list-item">
                        <div class="item-preview">
                            <img src="${data.image_url || 'https://via.placeholder.com/100'}" class="item-img">
                            <span style="font-weight:900">${data.name}</span>
                        </div>
                        <button class="btn-danger" onclick="deleteItem('categories','${doc.id}')">حذف</button>
                    </div>`;
            });
        });

        db.collection("global_content").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const list = document.getElementById("cardList");
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="list-item">
                        <div class="item-preview">
                            <img src="${data.image_url}" class="item-img">
                            <span>${data.title}</span>
                        </div>
                        <button class="btn-danger" onclick="deleteItem('global_content','${doc.id}')">حذف</button>
                    </div>`;
            });
        });
    }

    async function uploadToCloudinary(file) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: "POST", body: formData });
        const data = await res.json();
        return data.secure_url;
    }

    async function createFolderWithImage() {
        const name = document.getElementById("folderName").value;
        const file = document.getElementById("folderImage").files[0];
        if(!name || !file) return alert("أكمل بيانات المجلد يا بطل");
        document.getElementById("mainLoader").style.display = "block";
        try {
            const imgUrl = await uploadToCloudinary(file);
            await db.collection("categories").add({
                name: name, image_url: imgUrl, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById("folderName").value = "";
        } catch(e) { alert("خطأ في الرفع"); }
        document.getElementById("mainLoader").style.display = "none";
    }

    async function uploadCard() {
        const folderId = document.getElementById("folderSelect").value;
        const title = document.getElementById("cardTitle").value;
        const imgFile = document.getElementById("cardImage").files[0];
        const audFile = document.getElementById("cardAudio").files[0];
        if(!folderId || !title || !imgFile || !audFile) return alert("أكمل بيانات البطاقة");
        document.getElementById("mainLoader").style.display = "block";
        try {
            const imgUrl = await uploadToCloudinary(imgFile);
            const audUrl = await uploadToCloudinary(audFile);
            await db.collection("global_content").add({
                category_id: folderId, title: title, image_url: imgUrl, audio_url: audUrl,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        } catch(e) { alert("خطأ في النشر"); }
        document.getElementById("mainLoader").style.display = "none";
    }

    async function deleteItem(col, id) {
        if(confirm("هل أنت متأكد؟")) await db.collection(col).doc(id).delete();
    }
</script>
</body>
</html>
