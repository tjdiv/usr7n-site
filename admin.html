<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAMA Admin | Control Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #A2D2FF; 
            --soft-green: #B9F3E4;   
            --bg-light: #FDFBF7;     
            --text-main: #4A4A4A;
            --accent-pink: #FFC2D1;
            --white: #ffffff;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, var(--bg-light) 0%, #ffffff 100%);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* --- شاشة تسجيل الدخول --- */
        #loginScreen {
            width: 90%; max-width: 380px; padding: 3rem; margin-top: 15vh;
            background: var(--white); border-radius: 40px; 
            box-shadow: 0 20px 60px rgba(162, 210, 255, 0.15); text-align: center;
            border: 1px solid rgba(162, 210, 255, 0.3);
            position: relative;
        }

        .usr-tag {
            position: absolute; bottom: 15px; width: 100%; left: 0;
            font-size: 0.65rem; color: #ccc; letter-spacing: 2px; text-transform: uppercase;
        }

        /* --- لوحة التحكم المتطورة --- */
        #adminDashboard {
            display: none; width: 95%; max-width: 1200px; margin: 30px auto;
            grid-template-columns: 1fr 1.4fr; gap: 30px;
        }

        @media (max-width: 950px) { #adminDashboard { grid-template-columns: 1fr; } }

        .card { 
            background: var(--white); padding: 2.5rem; border-radius: 35px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.02); border: 1px solid #f0f0f0;
        }

        .logo-text { 
            font-size: 3rem; font-weight: 900; letter-spacing: 4px;
            background: linear-gradient(45deg, var(--primary-blue), var(--accent-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 25px; text-align: center;
        }

        .section-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
            color: var(--primary-blue); border-right: 4px solid var(--primary-blue);
            padding-right: 10px; font-weight: 900;
        }

        .input-group { margin-bottom: 1.2rem; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.85rem; color: #888; }
        
        input, select { 
            width: 100%; padding: 14px; border-radius: 15px; border: 2px solid #f7f7f7;
            background: #fbfcfe; transition: 0.3s; font-family: 'Tajawal';
        }
        input:focus { border-color: var(--primary-blue); outline: none; background: white; }

        .btn { 
            width: 100%; padding: 15px; border: none; border-radius: 18px; 
            font-weight: 900; cursor: pointer; transition: 0.3s; font-family: 'Tajawal';
        }
        .btn-blue { background: var(--primary-blue); color: white; }
        .btn-green { background: var(--soft-green); color: #4A4A4A; }
        .btn-danger { background: #FF9B9B; color: white; padding: 6px 12px; font-size: 0.8rem; border-radius: 10px; }

        .scroll-area { max-height: 480px; overflow-y: auto; padding-left: 10px; }
        .list-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; background: #fafafa; border-radius: 18px; margin-bottom: 10px;
            border: 1px solid #eee;
        }
        .item-preview { display: flex; align-items: center; gap: 12px; }
        .item-img { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; background: #eee; }

        .stats-pill { 
            background: #f0f9ff; padding: 8px 20px; border-radius: 50px; 
            display: inline-flex; align-items: center; gap: 10px; font-weight: 900;
            color: var(--primary-blue); font-size: 0.9rem; margin-bottom: 20px;
        }

        .footer-box {
            margin: 40px 0; padding: 15px 35px; background: white;
            border-radius: 20px; border: 1px solid var(--accent-pink);
            animation: pulse 2.5s infinite; text-align: center;
        }
        .footer-text { font-size: 1.2rem; font-weight: 900; color: #555; margin: 0; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.03); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .loader { display:none; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid var(--primary-blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="logo-text">LAMA</div>
    <div class="input-group">
        <input type="password" id="adminPass" placeholder="رمز الدخول">
    </div>
    <button class="btn btn-blue" onclick="attemptLogin()">دخول</button>
    <div class="usr-tag">usr7n</div>
</div>

<div id="adminDashboard" style="display: none;">
    <div class="side-panel">
        <div class="card">
            <div style="text-align: center;">
                <div class="stats-pill">
                    <span>👥</span>
                    <span><span id="userCount">0</span> جهاز متصل</span>
                </div>
            </div>
            
            <div class="section-header">📦 إدارة المجلدات</div>
            <div class="input-group">
                <input type="text" id="folderName" placeholder="اسم المجلد الجديد">
            </div>
            <div class="input-group">
                <label>صورة الغلاف للمجلد</label>
                <input type="file" id="folderImage" accept="image/*">
            </div>
            <button class="btn btn-blue" onclick="createFolderWithImage()">إنشاء المجلد</button>

            <div style="margin: 30px 0; border-top: 1px solid #eee;"></div>

            <div class="section-header">🎨 إضافة بطاقة جديدة</div>
            <div class="input-group">
                <select id="folderSelect"></select>
            </div>
            <div class="input-group">
                <input type="text" id="cardTitle" placeholder="عنوان البطاقة">
            </div>
            <div class="input-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>الصورة (إجباري)</label><input type="file" id="cardImage" accept="image/*"></div>
                <div><label>الصوت (اختياري)</label><input type="file" id="cardAudio" accept="audio/*,video/*"></div>
            </div>
            <button class="btn btn-green" onclick="uploadCard()">نشر للجميع 🚀</button>
            <div id="mainLoader" class="loader"></div>
        </div>
    </div>

    <div class="main-panel">
        <div class="card">
            <div class="section-header">📁 المجلدات الحالية</div>
            <div id="catList" class="scroll-area"></div>

            <div style="margin: 30px 0; border-top: 1px solid #eee;"></div>

            <div class="section-header">🃏 البطاقات المنشورة</div>
            <div id="cardList" class="scroll-area"></div>
        </div>
    </div>
</div>

<div class="footer-box" id="footerBox" style="display: none;">
    <p class="footer-text">وَمَا تَوْفِيقِي إِلَّا بِاللَّهِ</p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "aaa-app-usr.firebaseapp.com",
        projectId: "aaa-app-usr",
        storageBucket: "aaa-app-usr.appspot.com",
        appId: "1:73920829150:web:8b770c78afc13f97c1544f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const CLOUD_NAME = "dmj9rw7fx";
    const UPLOAD_PRESET = "tlal-1234";

    function attemptLogin() {
        if (document.getElementById('adminPass').value === "1234") {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'grid';
            document.getElementById('footerBox').style.display = 'block';
            startSystem();
        } else { alert("رمز الدخول غير صحيح"); }
    }

    function startSystem() {
        db.collection("analytics").doc("users_stats").onSnapshot(doc => {
            if(doc.exists) document.getElementById("userCount").innerText = doc.data().total_devices || 0;
        });

        db.collection("categories").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const select = document.getElementById("folderSelect");
            const catList = document.getElementById("catList");
            select.innerHTML = ""; catList.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                select.innerHTML += `<option value="${doc.id}">${data.name}</option>`;
                catList.innerHTML += `
                    <div class="list-item">
                        <div class="item-preview">
                            <img src="${data.image_url || ''}" class="item-img">
                            <span style="font-weight:bold">${data.name}</span>
                        </div>
                        <button class="btn-danger" onclick="deleteItem('categories','${doc.id}')">حذف</button>
                    </div>`;
            });
        });

        db.collection("global_content").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const list = document.getElementById("cardList");
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="list-item">
                        <div class="item-preview">
                            <img src="${data.image_url}" class="item-img">
                            <span>${data.title}</span>
                        </div>
                        <button class="btn-danger" onclick="deleteItem('global_content','${doc.id}')">حذف</button>
                    </div>`;
            });
        });
    }

    async function uploadToCloudinary(file) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: "POST", body: formData });
        const data = await res.json();
        return data.secure_url;
    }

    async function createFolderWithImage() {
        const name = document.getElementById("folderName").value;
        const file = document.getElementById("folderImage").files[0];
        if(!name || !file) return alert("أكمل البيانات");
        document.getElementById("mainLoader").style.display = "block";
        try {
            const imgUrl = await uploadToCloudinary(file);
            await db.collection("categories").add({
                name: name, image_url: imgUrl, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById("folderName").value = "";
        } catch(e) { alert("خطأ في الرفع"); }
        document.getElementById("mainLoader").style.display = "none";
    }

    async function uploadCard() {
        const folderId = document.getElementById("folderSelect").value;
        const title = document.getElementById("cardTitle").value;
        const imgFile = document.getElementById("cardImage").files[0];
        const audFile = document.getElementById("cardAudio").files[0];

        // لاحظ هنا تم حذف !audFile من الشرط ليكون اختيارياً
        if(!folderId || !title || !imgFile) return alert("يرجى إدخال العنوان واختيار صورة على الأقل");
        
        document.getElementById("mainLoader").style.display = "block";
        try {
            // رفع الصورة (إجباري)
            const imgUrl = await uploadToCloudinary(imgFile);
            
            // رفع الصوت فقط إذا كان موجوداً
            let audUrl = "";
            if (audFile) {
                audUrl = await uploadToCloudinary(audFile);
            }

            await db.collection("global_content").add({
                category_id: folderId, 
                title: title, 
                image_url: imgUrl, 
                audio_url: audUrl, // ستكون فارغة إذا لم يتم الرفع
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            // إعادة تعيين الحقول بعد النجاح
            document.getElementById("cardTitle").value = "";
            document.getElementById("cardImage").value = "";
            document.getElementById("cardAudio").value = "";
            alert("تم النشر بنجاح!");
            
        } catch(e) { 
            console.error(e);
            alert("خطأ في النشر"); 
        }
        document.getElementById("mainLoader").style.display = "none";
    }

    async function deleteItem(col, id) {
        if(confirm("هل أنت متأكد؟")) await db.collection(col).doc(id).delete();
    }
</script>
</body>
</html>
