<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAMA Admin | إدارة وحذف المحتوى</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #A2D2FF; 
            --soft-green: #B9F3E4;   
            --bg-beige: #FDFBF7;     
            --text-dark: #333333;
            --danger-red: #ff4d4d;
        }

        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg-beige); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: #fff; padding: 2rem; border-radius: 25px; box-shadow: 0 10px 30px rgba(162,210,255,0.2); width: 100%; max-width: 500px; border: 2px solid var(--primary-blue); text-align: center; margin-bottom: 20px; }
        
        .logo { font-size: 3rem; font-weight: 900; background: linear-gradient(to right, var(--primary-blue), #57C5B6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        
        .input-group { margin-bottom: 1rem; text-align: right; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-primary { background: var(--primary-blue); color: white; }
        .btn-danger { background: var(--danger-red); color: white; padding: 5px 10px; width: auto; font-size: 0.8rem; }

        /* تنسيق قائمة الإدارة */
        .admin-list { width: 100%; max-width: 600px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .list-item:last-child { border-bottom: none; }
        .item-info { display: flex; align-items: center; gap: 10px; }
        .item-thumb { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
        
        .section-title { color: var(--primary-blue); border-bottom: 2px solid var(--soft-green); padding-bottom: 5px; margin-top: 20px; text-align: right; }
    </style>
</head>
<body>

<div class="container" id="loginBox">
    <div class="logo">LAMA</div>
    <input type="password" id="adminPass" placeholder="كلمة المرور">
    <button class="btn btn-primary" onclick="checkPass()">دخول المشرف</button>
</div>

<div id="mainPanel" style="display:none; width: 100%; display: flex; flex-direction: column; align-items: center;">
    
    <div class="container">
        <div class="logo">إضافة محتوى</div>
        <div class="input-group">
            <label>اسم المجلد الجديد</label>
            <input type="text" id="folderName">
            <button class="btn btn-primary" onclick="createFolder()">إنشاء مجلد</button>
        </div>
        <hr>
        <div class="input-group">
            <label>اختر المجلد</label>
            <select id="folderSelect"></select>
        </div>
        <div class="input-group">
            <label>اسم البطاقة</label>
            <input type="text" id="cardTitle">
        </div>
        <div class="input-group">
            <label>الصورة</label>
            <input type="file" id="cardImage" accept="image/*">
        </div>
        <div class="input-group">
            <label>الصوت/فيديو</label>
            <input type="file" id="cardAudio" accept="audio/*,video/*">
        </div>
        <button class="btn btn-primary" onclick="uploadCard()">نشر في التطبيق 🚀</button>
    </div>

    <div class="admin-list">
        <h2 class="section-title">إدارة المجلدات (Categories)</h2>
        <div id="categoriesList">جاري التحميل...</div>

        <h2 class="section-title">إدارة البطاقات (Cards)</h2>
        <div id="cardsList">جاري التحميل...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSy...", // مفتاحك
        authDomain: "aaa-app-usr.firebaseapp.com",
        projectId: "aaa-app-usr",
        storageBucket: "aaa-app-usr.appspot.com",
        appId: "1:73920829150:web:8b770c78afc13f97c1544f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function checkPass() {
        if(document.getElementById('adminPass').value === "1234") {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'flex';
            loadData();
        } else { alert("خطأ!"); }
    }

    // تحميل البيانات وعرضها للحذف
    function loadData() {
        // تحميل المجلدات
        db.collection("categories").onSnapshot(snapshot => {
            const list = document.getElementById("categoriesList");
            const select = document.getElementById("folderSelect");
            list.innerHTML = ""; select.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                select.innerHTML += `<option value="${doc.id}">${data.name}</option>`;
                list.innerHTML += `
                    <div class="list-item">
                        <span>📁 ${data.name}</span>
                        <button class="btn btn-danger" onclick="deleteItem('categories', '${doc.id}')">حذف</button>
                    </div>`;
            });
        });

        // تحميل البطاقات
        db.collection("global_content").onSnapshot(snapshot => {
            const list = document.getElementById("cardsList");
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="list-item">
                        <div class="item-info">
                            <img src="${data.image_url}" class="item-thumb">
                            <span>${data.title}</span>
                        </div>
                        <button class="btn btn-danger" onclick="deleteItem('global_content', '${doc.id}')">حذف</button>
                    </div>`;
            });
        });
    }

    // دالة الحذف الشاملة
    async function deleteItem(collection, id) {
        if(confirm("هل أنت متأكد من الحذف؟ سيختفي من التطبيق فوراً.")) {
            await db.collection(collection).document(id).delete();
            alert("تم الحذف بنجاح");
        }
    }

    // دوال الرفع (نفس السابقة)
    async function createFolder() {
        const name = document.getElementById("folderName").value;
        await db.collection("categories").add({ name: name });
        document.getElementById("folderName").value = "";
    }

    async function uploadCard() {
        // ... (كود الرفع لـ Cloudinary و Firestore كما في الرد السابق)
    }
</script>
</body>
</html>
