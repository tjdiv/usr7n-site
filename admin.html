<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USR7N | لوحة التحكم الذكية</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #00d2ff;
            --secondary-glow: #3a7bd5;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        /* شعار USR7N اللامع والنابض */
        .logo {
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: 5px;
            background: linear-gradient(to right, #00d2ff, #91eae4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite ease-in-out;
            filter: drop-shadow(0 0 10px var(--primary-glow));
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 20px var(--primary-glow)); }
        }

        .welcome-text {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #e2e8f0;
            font-weight: bold;
        }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-glow);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        .btn-publish {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--secondary-glow), var(--primary-glow));
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-publish:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.4);
        }

        .btn-publish:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        /* شريط التحميل "الصاروخ" */
        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<div class="container" id="loginBox">
    <div class="logo">USR7N</div>
    <p class="welcome-text">مرحباً بك يا لما في لوحة التحكم الآمنة</p>
    
    <div class="input-group">
        <label>كلمة مرور المسؤول</label>
        <input type="password" id="adminPass" style="width:100%; padding:12px; border-radius:10px; background:#0f172a; border:1px solid #334155; color:white;">
    </div>
    <button class="btn-publish" onclick="checkPass()">دخول المسؤول</button>
</div>

<div class="container" id="mainPanel" style="display:none;">
    <div class="logo">USR7N</div>
    <p class="welcome-text">إدارة المحتوى التعليمي - وضع المسؤول</p>

    <div class="input-group">
        <label>اسم البطاقة (مثال: تفاحة)</label>
        <input type="text" id="titleInput" placeholder="أدخل اسم العنصر...">
    </div>

    <div class="input-group">
        <label>صورة البطاقة</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div class="input-group">
        <label>نطق الكلمة (ملف صوتي)</label>
        <input type="file" id="audioInput" accept="audio/*">
    </div>

    <button class="btn-publish" id="uploadBtn" onclick="handlePublish()">
        <span id="btnText">رفع ونشر المحتوى</span>
        <div class="loader" id="loader"></div>
    </button>
</div>

<script>
    // --- إعدادات Firebase (ضع قيمك هنا) ---
    const firebaseConfig = {
        apiKey: "ضع_مفتاحك_هنا",
        authDomain: "aaa-app-usr.firebaseapp.com",
        projectId: "aaa-app-usr",
        storageBucket: "aaa-app-usr.appspot.com",
        messagingSenderId: "73920829150",
        appId: "1:73920829150:web:8b770c78afc13f97c1544f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- إعدادات Cloudinary ---
    const CLOUD_NAME = "dmj9rw7fx";
    const UPLOAD_PRESET = "tlal-1234";

    function checkPass() {
        const pass = document.getElementById('adminPass').value;
        if (pass === "1234") {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
        } else {
            alert("كلمة مرور غير صحيحة يا لما");
        }
    }

    async function uploadToCloudinary(file) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);

        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, {
            method: "POST",
            body: formData
        });

        if (!response.ok) throw new Error("فشل الرفع للسحابة");
        const data = await response.json();
        return data.secure_url;
    }

    async function handlePublish() {
        const title = document.getElementById('titleInput').value;
        const imageFile = document.getElementById('imageInput').files[0];
        const audioFile = document.getElementById('audioInput').files[0];
        const btn = document.getElementById('uploadBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');

        if (!title || !imageFile || !audioFile) {
            alert("لما، تأكدي من إكمال جميع الحقول!");
            return;
        }

        btn.disabled = true;
        btnText.innerText = "جاري الإطلاق...";
        loader.style.display = "block";

        try {
            // الرفع لـ Cloudinary
            const imageUrl = await uploadToCloudinary(imageFile);
            const audioUrl = await uploadToCloudinary(audioFile);

            // الحفظ في Firestore
            await db.collection("global_content").add({
                title: title,
                image_url: imageUrl,
                audio_url: audioUrl,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("تم بنجاح! المحتوى الآن متاح في تطبيقك 🚀");
            location.reload();
        } catch (error) {
            console.error(error);
            alert("حدث خطأ تقني: " + error.message);
            btn.disabled = false;
            btnText.innerText = "حاول مرة أخرى";
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
