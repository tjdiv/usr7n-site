<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم ا | </title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f4f7f6; }
        .login-container { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .admin-card { display: none; margin-top: 50px; border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #4e73df; border: none; padding: 12px; font-weight: bold; }
        .btn-primary:hover { background-color: #2e59d9; }
        .header-section { background: linear-gradient(135deg, #4e73df 0%, #224abe 100%); color: white; padding: 30px; border-radius: 15px 15px 0 0; text-align: center; }
        #uploadProgress { height: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container login-container" id="loginPage">
    <div class="card p-4 shadow-sm" style="width: 100%; max-width: 400px;">
        <h3 class="text-center mb-4">تسجيل الدخول للمشرف</h3>
        <input type="password" id="entryPass" class="form-control mb-3" placeholder="أدخل كلمة المرور">
        <button class="btn btn-primary w-100" onclick="checkLogin()">دخول</button>
        <p id="loginError" class="text-danger mt-2 text-center" style="display:none;">كلمة المرور غير صحيحة!</p>
    </div>
</div>

<div class="container" id="adminPanel" style="display:none;">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card admin-card" style="display: block;">
                <div class="header-section">
                    <h2>إضافة محتوى جديد للتطبيق</h2>
                    <p>أضف الصور والأصوات لتظهر فوراً عند جميع الطلاب</p>
                </div>
                <div class="card-body p-5">
                    <div class="mb-4">
                        <label class="form-label fw-bold">اسم العنصر (يظهر تحت الصورة)</label>
                        <input type="text" id="itemName" class="form-control" placeholder="مثلاً: سيارة، تفاحة، مدرسة...">
                    </div>
                    
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">صورة العنصر</label>
                            <input type="file" id="imgFile" class="form-control" accept="image/*">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">ملف الصوت (النطق)</label>
                            <input type="file" id="audioFile" class="form-control" accept="audio/*">
                        </div>
                    </div>

                    <div class="progress mb-3" style="display: none;" id="progBar">
                        <div id="uploadProgress" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%"></div>
                    </div>

                    <div id="status" class="text-center mb-3 text-muted"></div>

                    <button class="btn btn-primary w-100 shadow" onclick="startUpload()">
                        🚀 رفع ونشر المحتوى الآن
                    </button>
                    
                    <button class="btn btn-link w-100 mt-3 text-secondary" onclick="location.reload()">تسجيل الخروج</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
      apiKey: "AIzaSyByCUmUMfowIjuz94CnMLLstvcUlTjvi0c",
      authDomain: "aaa-app-usr.firebaseapp.com",
      projectId: "aaa-app-usr",
      storageBucket: "aaa-app-usr.firebasestorage.app",
      messagingSenderId: "73920829150",
      appId: "1:73920829150:web:8b770c78afc13f97c1544f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    // وظيفة التحقق من كلمة المرور
    function checkLogin() {
        const pass = document.getElementById('entryPass').value;
        if (pass === "1234") {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    async function startUpload() {
        const name = document.getElementById('itemName').value;
        const imgFile = document.getElementById('imgFile').files[0];
        const audioFile = document.getElementById('audioFile').files[0];
        const status = document.getElementById('status');
        const progDiv = document.getElementById('progBar');
        const progBar = document.getElementById('uploadProgress');

        if (!name || !imgFile || !audioFile) {
            alert("يا بطل، لازم تعبي كل البيانات وتختار الملفات أولاً!");
            return;
        }

        try {
            progDiv.style.display = "block";
            status.innerText = "جاري رفع الصور والأصوات...";

            // 1. رفع الصورة
            const imgRef = storage.ref(`images/${Date.now()}_${imgFile.name}`);
            await imgRef.put(imgFile);
            const imgUrl = await imgRef.getDownloadURL();
            progBar.style.width = "50%";

            // 2. رفع الصوت
            const audioRef = storage.ref(`audios/${Date.now()}_${audioFile.name}`);
            await audioRef.put(audioFile);
            const audioUrl = await audioRef.getDownloadURL();
            progBar.style.width = "80%";

            // 3. الحفظ في Firestore
            await db.collection("global_content").add({
                title: name,
                image_url: imgUrl,
                audio_url: audioUrl,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            progBar.style.width = "100%";
            status.innerHTML = "<b class='text-success'>✅ تم النشر بنجاح! ستظهر في التطبيق فوراً.</b>";
            
            setTimeout(() => { location.reload(); }, 2000);

        } catch (error) {
            status.innerHTML = "<b class='text-danger'>❌ فشل الرفع: " + error.message + "</b>";
        }
    }
</script>
</body>
</html>
