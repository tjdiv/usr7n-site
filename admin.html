<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAMA | لوحة التحكم الاحترافية</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #ff007f;
            --secondary-glow: #ff80bf;
            --dark-bg: #0d0111;
            --card-bg: #1a0222;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--dark-bg);
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* الإحصائيات */
        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 600px;
        }

        .stat-box {
            flex: 1;
            background: var(--card-bg);
            border: 2px solid var(--primary-glow);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.2);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary-glow);
            text-shadow: 0 0 10px var(--primary-glow);
        }

        /* الشعار اللامع */
        .logo {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 10px;
            background: linear-gradient(to right, var(--primary-glow), #ffffff, var(--secondary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite;
            filter: drop-shadow(0 0 15px var(--primary-glow));
            margin-bottom: 10px;
        }

        @keyframes pulse { 50% { transform: scale(1.05); opacity: 0.8; } }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 25px;
            width: 100%;
            max-width: 550px;
            border: 1px solid rgba(255, 0, 127, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .section-title {
            color: var(--secondary-glow);
            border-right: 4px solid var(--primary-glow);
            padding-right: 10px;
            margin: 25px 0 15px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #4d0026;
            background: #0d0111;
            color: white;
            box-sizing: border-box;
        }

        .btn-action {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(45deg, #cc0066, var(--primary-glow));
            color: white;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 0, 127, 0.4);
        }

        .loader { display: none; width: 20px; height: 20px; border: 3px solid #fff; border-top: 3px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="logo">LAMA</div>
    
    <div class="stats-container">
        <div class="stat-box">
            <div class="stat-value" id="userCount">0</div>
            <div class="stat-label">نشاط المستخدمين</div>
        </div>
    </div>

    <div class="container">
        <div class="section-title">إنشاء مجلد جديد</div>
        <input type="text" id="folderName" placeholder="اسم المجلد (مثل: الألوان)">
        <button class="btn-action" onclick="createFolder()">إضافة المجلد +</button>

        <hr style="border: 0.5px solid #4d0026; margin: 30px 0;">

        <div class="section-title">إضافة بطاقة داخل مجلد</div>
        <select id="folderSelect">
            <option value="">جاري تحميل المجلدات...</option>
        </select>
        
        <input type="text" id="cardTitle" placeholder="اسم البطاقة (مثل: أحمر)">
        <label>صورة البطاقة:</label>
        <input type="file" id="cardImage" accept="image/*">
        
        <label>صوت النطق:</label>
        <input type="file" id="cardAudio" accept="audio/*">

        <button class="btn-action" id="uploadBtn" onclick="uploadCard()">
            <span id="btnText">نشر البطاقة 🚀</span>
            <div class="loader" id="loader"></div>
        </button>
    </div>

<script>
    // --- إعدادات Firebase ---
    const firebaseConfig = {
        apiKey: "AIzaSy...", // ضع هنا الـ API Key الخاص بك
        authDomain: "aaa-app-usr.firebaseapp.com",
        projectId: "aaa-app-usr",
        storageBucket: "aaa-app-usr.appspot.com",
        messagingSenderId: "73920829150",
        appId: "1:73920829150:web:8b770c78afc13f97c1544f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- إعدادات Cloudinary ---
    const CLOUD_NAME = "dmj9rw7fx";
    const UPLOAD_PRESET = "tlal-1234";

    // 1. مراقبة عداد المستخدمين
    db.collection("analytics").doc("users_stats").onSnapshot(doc => {
        if(doc.exists) document.getElementById("userCount").innerText = doc.data().total_opens || 0;
    });

    // 2. تحميل المجلدات في القائمة المنسدلة
    function loadFolders() {
        db.collection("categories").onSnapshot(snapshot => {
            const select = document.getElementById("folderSelect");
            select.innerHTML = '<option value="">-- اختر المجلد --</option>';
            snapshot.forEach(doc => {
                select.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`;
            });
        });
    }
    loadFolders();

    // 3. إنشاء مجلد
    async function createFolder() {
        const name = document.getElementById("folderName").value;
        if(!name) return alert("اكتب اسم المجلد!");
        await db.collection("categories").add({ name: name, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        alert("تم إنشاء المجلد بنجاح");
        document.getElementById("folderName").value = "";
    }

    // 4. رفع الملفات لـ Cloudinary
    async function uploadToCloudinary(file) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: "POST", body: formData });
        const data = await res.json();
        return data.secure_url;
    }

    // 5. نشر البطاقة
    async function uploadCard() {
        const folderId = document.getElementById("folderSelect").value;
        const title = document.getElementById("cardTitle").value;
        const imgFile = document.getElementById("cardImage").files[0];
        const audFile = document.getElementById("cardAudio").files[0];

        if(!folderId || !title || !imgFile || !audFile) return alert("أكمل جميع البيانات يا طلال!");

        const btn = document.getElementById("uploadBtn");
        btn.disabled = true;
        document.getElementById("loader").style.display = "inline-block";

        try {
            const imgUrl = await uploadToCloudinary(imgFile);
            const audUrl = await uploadToCloudinary(audFile);

            await db.collection("global_content").add({
                category_id: folderId,
                title: title,
                image_url: imgUrl,
                audio_url: audUrl,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("تم رفع البطاقة بنجاح لـ " + title);
            location.reload();
        } catch (e) {
            alert("خطأ: " + e.message);
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
