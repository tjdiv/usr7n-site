<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAMA | لوحة التحكم ة</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #ff007f; /* Cyber Pink */
            --secondary-glow: #ff80bf;
            --dark-bg: #0d0111; /* Ultra Dark Purple/Black */
            --card-bg: #1a0222; /* Dark Purple */
            --text-color: #e2e8f0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* حاوية اللوحة الأساسية */
        .container {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 25px;
            box-shadow: 0 0 60px rgba(255, 0, 127, 0.3); /* الوردي */
            width: 100%;
            max-width: 550px;
            border: 2px solid rgba(255, 0, 127, 0.1);
            position: relative;
            transition: 0.5s ease-in-out;
            transform-style: preserve-3d;
        }

        /* شعار LAMA اللامع والنابض */
        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .logo {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--primary-glow), #ffffff, var(--secondary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: cyberPulse 2.5s infinite ease-in-out;
            filter: drop-shadow(0 0 15px var(--primary-glow));
        }

        @keyframes cyberPulse {
            0%, 100% { transform: scale(1); opacity: 0.9; filter: drop-shadow(0 0 15px var(--primary-glow)); }
            50% { transform: scale(1.08); opacity: 1; filter: drop-shadow(0 0 30px var(--secondary-glow)); }
        }

        .welcome-text {
            text-align: center;
            color: #ffb3d9; /* فاتح وردي */
            margin-top: -1rem;
            margin-bottom: 2.5rem;
            font-size: 1rem;
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 1.8rem;
        }

        label {
            display: block;
            margin-bottom: 0.6rem;
            color: #ffb3d9;
            font-weight: bold;
            font-size: 0.95rem;
        }

        input[type="text"], input[type="password"], input[type="file"] {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #4d0026; /* غامق وردي */
            background: #0d0111;
            color: white;
            box-sizing: border-box;
            transition: 0.3s;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-glow);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
        }

        /* زر النشر "الصاروخي" */
        .btn-publish {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(45deg, #cc0066, var(--primary-glow));
            color: white;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .btn-publish:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 30px rgba(255, 0, 127, 0.5);
        }

        .btn-publish:disabled {
            background: #660033;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* شريط التحميل "الصاروخ" المطور */
        .loader {
            display: none;
            width: 25px;
            height: 25px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<div class="container" id="loginBox">
    <div class="logo-container">
        <div class="logo">LAMA</div>
    </div>
    <p class="welcome-text">مرحباً بكِ يا لما في لوحة التحكم </p>
    
    <div class="input-group">
        <label>كلمة مرور المسؤول</label>
        <input type="password" id="adminPass" placeholder="أدخلي كلمة المرور الخاص بك...">
    </div>
    <button class="btn-publish" onclick="checkPass()">دخول المسؤول</button>
</div>

<div class="container" id="mainPanel" style="display:none;">
    <div class="logo-container">
        <div class="logo">LAMA</div>
    </div>
    <p class="welcome-text">إدارة المحتوى التعليمي - وضع المسؤول</p>

    <div class="input-group">
        <label>اسم البطاقة (مثال: تفاحة)</label>
        <input type="text" id="titleInput" placeholder="أدخلي اسم العنصر...">
    </div>

    <div class="input-group">
        <label>صورة البطاقة</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div class="input-group">
        <label>نطق الكلمة (ملف صوتي)</label>
        <input type="file" id="audioInput" accept="audio/*">
    </div>

    <button class="btn-publish" id="uploadBtn" onclick="handlePublish()">
        <span id="btnText">رفع ونشر المحتوى</span>
        <div class="loader" id="loader"></div>
    </button>
</div>

<script>
    // --- إعدادات Firebase (تأكدي من وضع قيمك هنا) ---
    const firebaseConfig = {
        apiKey: "ضع_مفتاحك_هنا", // <--- استبدليه بـ API Key الخاص بك
        authDomain: "aaa-app-usr.firebaseapp.com",
        projectId: "aaa-app-usr",
        storageBucket: "aaa-app-usr.appspot.com",
        messagingSenderId: "73920829150",
        appId: "1:73920829150:web:8b770c78afc13f97c1544f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- إعدادات Cloudinary (جاهزة) ---
    const CLOUD_NAME = "dmj9rw7fx";
    const UPLOAD_PRESET = "tlal-1234";

    function checkPass() {
        const pass = document.getElementById('adminPass').value;
        if (pass === "1234") {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
        } else {
            alert("كلمة مرور غير صحيحة يا لما");
        }
    }

    async function uploadToCloudinary(file) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);

        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, {
            method: "POST",
            body: formData
        });

        if (!response.ok) throw new Error("فشل الرفع للسحابة");
        const data = await response.json();
        return data.secure_url;
    }

    async function handlePublish() {
        const title = document.getElementById('titleInput').value;
        const imageFile = document.getElementById('imageInput').files[0];
        const audioFile = document.getElementById('audioInput').files[0];
        const btn = document.getElementById('uploadBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');

        if (!title || !imageFile || !audioFile) {
            alert("لما، تأكدي من إكمال جميع الحقول!");
            return;
        }

        btn.disabled = true;
        btnText.innerText = "جاري الإطلاق...";
        loader.style.display = "block";

        try {
            // الرفع لـ Cloudinary
            const imageUrl = await uploadToCloudinary(imageFile);
            const audioUrl = await uploadToCloudinary(audioFile);

            // الحفظ في Firestore
            await db.collection("global_content").add({
                title: title,
                image_url: imageUrl,
                audio_url: audioUrl,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("كفو! تم بنجاح! المحتوى الآن متاح في تطبيقك 🚀");
            location.reload();
        } catch (error) {
            console.error(error);
            alert("حدث خطأ تقني: " + error.message);
            btn.disabled = false;
            btnText.innerText = "حاول مرة أخرى";
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
