<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAMA Admin | لوحة التحكم الذكية</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #A2D2FF; 
            --soft-green: #B9F3E4;   
            --bg-beige: #FDFBF7;     
            --text-dark: #333333;
            --accent-green: #57C5B6;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-beige);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(162, 210, 255, 0.2); 
            width: 100%;
            max-width: 500px;
            border: 2px solid var(--primary-blue);
            text-align: center;
        }

        .logo {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 5px;
            background: linear-gradient(to right, var(--primary-blue), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .welcome-text { color: #666; margin-bottom: 2rem; font-weight: bold; }

        .stats-badge {
            background: var(--soft-green);
            padding: 8px 15px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 1.2rem; text-align: right; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: var(--text-dark); }
        
        input, select {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 2px solid #eee; background: #fafafa;
            box-sizing: border-box; transition: 0.3s;
        }

        input:focus { border-color: var(--primary-blue); outline: none; background: white; }

        .btn-action {
            width: 100%; padding: 15px; border: none; border-radius: 15px;
            background: linear-gradient(45deg, var(--primary-blue), var(--accent-green));
            color: white; font-size: 1.1rem; font-weight: 900;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(162, 210, 255, 0.3); }

        .record-box {
            display: flex; gap: 10px; margin-top: 10px; align-items: center;
        }

        #recordBtn { background: #ff6b6b; color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; flex: 1; font-weight: bold;}
        
        .loader { display: none; width: 20px; height: 20px; border: 3px solid #fff; border-top: 3px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        hr { border: 0; border-top: 1px solid #eee; margin: 25px 0; }
    </style>
</head>
<body>

<div class="container" id="loginBox">
    <div class="logo">LAMA</div>
    <p class="welcome-text">لوحة تحكم طلال (USR7N)</p>
    <div class="input-group">
        <label>كلمة المرور</label>
        <input type="password" id="adminPass" placeholder="••••••••">
    </div>
    <button class="btn-action" onclick="checkPass()">دخول</button>
</div>

<div class="container" id="mainPanel" style="display:none;">
    <div class="stats-badge">
        <span>👥</span> <span id="userCount">0</span> <span>جهاز مسجل</span>
    </div>
    <div class="logo" style="font-size: 2.5rem;">LAMA</div>

    <div class="input-group">
        <label>١. إضافة مجلد جديد</label>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="folderName" placeholder="مثال: الأفعال">
            <button onclick="createFolder()" style="background: var(--soft-green); border: none; padding: 0 15px; border-radius: 10px; cursor: pointer; font-weight: bold;">+</button>
        </div>
    </div>

    <hr>

    <div class="input-group">
        <label>٢. المجلد المستهدف</label>
        <select id="folderSelect"><option>جاري التحميل...</option></select>
    </div>

    <div class="input-group">
        <label>٣. اسم البطاقة</label>
        <input type="text" id="cardTitle" placeholder="مثال: أريد أن أشرب">
    </div>

    <div class="input-group" style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>الصورة/فيديو</label>
            <input type="file" id="cardImage" accept="image/*,video/*">
        </div>
        <div style="flex: 1;">
            <label>صوت جاهز</label>
            <input type="file" id="cardAudio" accept="audio/*,video/*">
        </div>
    </div>

    <div class="input-group">
        <label>أو سجل صوتك الآن بشكل مرتب:</label>
        <div class="record-box">
            <button id="recordBtn" onclick="toggleRecording()">🎤 ابدأ التسجيل</button>
            <span id="timer" style="display:none; color: red; font-weight: bold;">00:00</span>
        </div>
        <audio id="audioPreview" controls style="display:none; width: 100%; margin-top: 10px;"></audio>
    </div>

    <button class="btn-action" id="uploadBtn" onclick="uploadCard()">
        <span id="btnText">نشر في التطبيق 🚀</span>
        <div class="loader" id="loader"></div>
    </button>
</div>

<script>
    // --- إعدادات Firebase ---
    const firebaseConfig = {
        apiKey: "AIzaSy...", // ضع مفتاحك هنا
        authDomain: "aaa-app-usr.firebaseapp.com",
        projectId: "aaa-app-usr",
        storageBucket: "aaa-app-usr.appspot.com",
        messagingSenderId: "73920829150",
        appId: "1:73920829150:web:8b770c78afc13f97c1544f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const CLOUD_NAME = "dmj9rw7fx";
    const UPLOAD_PRESET = "tlal-1234";

    let mediaRecorder;
    let audioChunks = [];
    window.recordedAudioBlob = null;

    function checkPass() {
        if (document.getElementById('adminPass').value === "1234") {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('mainPanel').style.display = 'block';
            initApp();
        } else { alert("كلمة المرور خطأ!"); }
    }

    function initApp() {
        db.collection("analytics").doc("users_stats").onSnapshot(doc => {
            if(doc.exists) document.getElementById("userCount").innerText = doc.data().total_devices || 0;
        });
        db.collection("categories").onSnapshot(snapshot => {
            const select = document.getElementById("folderSelect");
            select.innerHTML = '<option value="">-- اختر مجلد --</option>';
            snapshot.forEach(doc => {
                select.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`;
            });
        });
    }

    async function toggleRecording() {
        const btn = document.getElementById('recordBtn');
        if (btn.innerText.includes("ابدأ")) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start();
            btn.innerText = "🛑 إيقاف وحفظ";
            btn.style.background = "#333";
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        } else {
            mediaRecorder.stop();
            btn.innerText = "🎤 ابدأ التسجيل";
            btn.style.background = "#ff6b6b";
            mediaRecorder.onstop = () => {
                window.recordedAudioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                const audioUrl = URL.createObjectURL(window.recordedAudioBlob);
                const preview = document.getElementById('audioPreview');
                preview.src = audioUrl; preview.style.display = "block";
            };
        }
    }

    async function createFolder() {
        const name = document.getElementById("folderName").value;
        if(!name) return;
        await db.collection("categories").add({ name: name, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        document.getElementById("folderName").value = "";
    }

    async function uploadToCloudinary(file) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: "POST", body: formData });
        const data = await res.json();
        return data.secure_url;
    }

    async function uploadCard() {
        const folderId = document.getElementById("folderSelect").value;
        const title = document.getElementById("cardTitle").value;
        const imgFile = document.getElementById("cardImage").files[0];
        const audFile = document.getElementById("cardAudio").files[0] || window.recordedAudioBlob;

        if(!folderId || !title || !imgFile || !audFile) return alert("أكمل البيانات أولاً!");

        document.getElementById("btnText").style.display = "none";
        document.getElementById("loader").style.display = "block";

        try {
            const imgUrl = await uploadToCloudinary(imgFile);
            const audUrl = await uploadToCloudinary(audFile);

            await db.collection("global_content").add({
                category_id: folderId,
                title: title,
                image_url: imgUrl,
                audio_url: audUrl,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("تم النشر بنجاح!");
            location.reload();
        } catch (e) {
            alert("خطأ: " + e.message);
            document.getElementById("btnText").style.display = "block";
            document.getElementById("loader").style.display = "none";
        }
    }
</script>
</body>
</html>
