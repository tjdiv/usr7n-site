<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USR7N | Developer Space</title>
    <style>
        /* تصفير الهوامش لملء الشاشة 100% */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* منع التمرير */
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .logo {
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: 900;
            letter-spacing: 20px;
            color: #39FF14; /* الأخضر التكتيكي */
            text-shadow: 0 0 40px rgba(57, 255, 20, 0.3);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .bio {
            max-width: 600px;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #666; /* لون خافت للتعريف */
            border-right: 2px solid #333;
            padding-right: 20px;
            margin: 0 auto;
        }

        .highlight {
            color: #39FF14;
            font-weight: bold;
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.7rem;
            color: #222;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">USR7N</div>
        
        <div class="bio">
            منصة <span class="highlight">USR7N</span> هي مساحة تقنية شخصية لمبرمج هاوي يستمتع ببناء الأدوات الرقمية وتطوير الحلول البرمجية. 
            هنا تتقاطع الهواية مع البرمجة لتنتج مشاريع فريدة.
        </div>
    </div>

    <footer>ACCESS GRANTED | © 2026</footer>

</body>
</html>
