<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بيـن | إدارة الطلبات والكاشير</title>
    <!-- استدعاء الخطوط -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- استدعاء التنسيقات الأساسية الخاصة بالموقع للحفاظ على نفس الألوان والخطوط -->
    <link rel="stylesheet" href="styles.css">
    <!-- استدعاء التنسيقات الخاصة بلوحة الكاشير -->
    <link rel="stylesheet" href="bayn.css">
</head>
<body class="bayn-dashboard">

    <!-- نافذة تسجيل دخول الكاشير (إجبارية) -->
    <div id="login-overlay" class="modal-overlay active" style="z-index: 3000;">
        <div class="modal-content login-box" style="padding-top: 20px;">
            <div class="sidebar-logo" style="border:none; text-align:center;">
                <!-- عرض الشعار باللون الكحلي الداكن -->
                <img src="2.png" alt="BAYN" style="width: 120px; filter: grayscale(1) contrast(1.5);">
            </div>
            <h2 style="text-align:center; color:var(--navy-deep); margin-bottom: 20px;">تسجيل دخول الكاشير</h2>
            <div style="padding: 0 30px 30px;">
                <input type="text" id="login-user" placeholder="اسم المستخدم" class="auth-input">
                <input type="password" id="login-pass" placeholder="كلمة المرور" class="auth-input">
                <button id="btn-login" class="btn-primary" style="margin-top: 15px;">تسجيل الدخول</button>
                <div id="login-error" style="color: red; text-align: center; margin-top: 10px; font-size: 0.9rem;"></div>
            </div>
        </div>
    </div>

    <!-- شريط علوي للجوال -->
    <div class="mobile-topbar">
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="القائمة">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22" height="22">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <span class="mobile-title">لوحة الكاشير</span>
        <div style="width:36px;"></div>
    </div>
    <!-- طبقة الظل خلف القائمة -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- لوحة التحكم الجانبية (Sidebar) -->
    <aside class="dashboard-sidebar" id="dashboard-sidebar">
        <button class="sidebar-close-btn" id="sidebar-close-btn">&times;</button>
        <div class="sidebar-logo">
            <img src="990.jpeg" alt="BAYN Logo">
        </div>
        <nav class="sidebar-nav">
            <button class="nav-item active" data-target="view-orders">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                إدارة الطلبات
            </button>

            <button class="nav-item" data-target="view-add-product">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                إضافة منتج للمنيو
            </button>
            <button class="nav-item" data-target="view-admin-products">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="8" y1="12" x2="16" y2="12"></line><line x1="8" y1="8" x2="16" y2="8"></line><line x1="8" y1="16" x2="16" y2="16"></line></svg>
                إدارة المنتجات والمكافآت
            </button>
        </nav>
        <div class="sidebar-footer">
            <a href="index.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                العودة للموقع
            </a>
        </div>
    </aside>

    <!-- المحتوى الرئيسي -->
    <main class="dashboard-main">
        
        <!-- قسم الطلبات -->
        <section id="view-orders" class="dashboard-view active">
            <header class="view-header">
                <h2>الطلبات الحالية</h2>
                <div style="display:flex; align-items:center; gap:15px; flex-wrap: wrap;">
                    <!-- زر التحكم في التوصيل -->
                    <div id="delivery-control-wrapper" style="
                        display: flex;
                        align-items: center;
                        gap: 10px;
                        background: rgba(216, 192, 146, 0.1);
                        padding: 6px 14px;
                        border-radius: 12px;
                        border: 1.5px solid rgba(216, 192, 146, 0.3);
                    ">
                        <span style="font-size: 0.9rem; font-weight: 700; color: var(--navy-deep);">خدمة التوصيل:</span>
                        <label class="switch">
                            <input type="checkbox" id="delivery-toggle-input">
                            <span class="slider round"></span>
                        </label>
                        <span id="delivery-status-label" style="font-size: 0.85rem; font-weight: 700;">...</span>
                    </div>

                    <span class="live-status"><span class="pulse-dot"></span> متصل</span>
                    <button id="btn-clear-completed" style="
                        background: rgba(231,76,60,0.1);
                        color: #c0392b;
                        border: 1.5px solid rgba(231,76,60,0.3);
                        padding: 8px 18px;
                        border-radius: 10px;
                        font-family: inherit;
                        font-size: 0.95rem;
                        font-weight: 700;
                        cursor: pointer;
                        transition: all 0.3s;
                        display: flex;
                        align-items: center;
                        gap: 7px;
                    ">
                        🧹 تنظيف المكتملة
                    </button>
                </div>
            </header>
            
            <div class="orders-grid" id="dashboard-orders-list">
                <!-- الطلبات ستضاف هنا برمجياً -->
            </div>
        </section>


        <!-- قسم إضافة منتج -->
        <section id="view-add-product" class="dashboard-view">
            <header class="view-header">
                <h2>إضافة منتج جديد للمنيو</h2>
            </header>
            <div class="add-product-container">
                <div class="add-product-card">
                    <!-- جهة الحقول -->
                    <div class="add-product-form">
                        <div class="form-group" style="margin-bottom: 25px;">
                            <label>اسم المنتج</label>
                            <input type="text" id="new-prod-name" class="auth-input" placeholder="مثال: V60 بارد">
                        </div>
                        <div class="form-group" style="margin-bottom: 30px;">
                            <label>السعر (ريال)</label>
                            <input type="number" id="new-prod-price" class="auth-input" placeholder="مثال: 18">
                        </div>
                        <button id="btn-add-product" class="btn-primary" style="width: 100%; padding: 16px;">
                            ✨ رفع وحفظ المنتج للمنيو
                        </button>
                        <div id="add-prod-status" class="status-message"></div>
                    </div>

                    <!-- جهة رفع الصورة -->
                    <div class="add-product-upload">
                        <label>صورة المنتج</label>
                        <label for="new-prod-image" class="upload-box">
                            <input type="file" id="new-prod-image" accept="image/*" hidden>
                            <div class="upload-placeholder" id="upload-placeholder">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                    <polyline points="21 15 16 10 5 21"></polyline>
                                </svg>
                                <span>اضغط لرفع صورة</span>
                                <small style="opacity: 0.6; font-size: 0.75rem;">JPG, PNG (Max 5MB)</small>
                            </div>
                            <img id="image-preview" src="" style="display:none;">
                        </label>
                    </div>
                </div>
            </div>
        </section>

        <!-- قسم إدارة المنتجات والمكافآت -->
        <section id="view-admin-products" class="dashboard-view">
            <header class="view-header">
                <h2>إدارة المنتجات والمكافآت</h2>
            </header>
            <div class="admin-table-wrapper">
                <table style="width: 100%; border-collapse: collapse; text-align: right;">
                    <thead>
                        <tr style="background: var(--cream-light); color: var(--navy-deep);">
                            <th style="padding: 12px; border-bottom: 2px solid #ddd;">المنتج</th>
                            <th style="padding: 12px; border-bottom: 2px solid #ddd;">السعر</th>
                            <th style="padding: 12px; border-bottom: 2px solid #ddd;">مكافأة؟</th>
                            <th style="padding: 12px; border-bottom: 2px solid #ddd;">سعر النقاط</th>
                            <th style="padding: 12px; border-bottom: 2px solid #ddd;">إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="admin-products-list">
                        <!-- Products listed here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- استدعاء مكتبات Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    
    <!-- استدعاء سكريبت الكاشير -->
    <script src="bayn.js"></script>

    <script>
        // Mobile sidebar toggle
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const sidebarCloseBtn = document.getElementById('sidebar-close-btn');
        const dashboardSidebar = document.getElementById('dashboard-sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        function openSidebar() {
            dashboardSidebar.classList.add('open');
            sidebarOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeSidebar() {
            dashboardSidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        if (mobileMenuBtn) mobileMenuBtn.addEventListener('click', openSidebar);
        if (sidebarCloseBtn) sidebarCloseBtn.addEventListener('click', closeSidebar);
        if (sidebarOverlay) sidebarOverlay.addEventListener('click', closeSidebar);

        // Close sidebar on nav item click (mobile)
        document.querySelectorAll('.nav-item[data-target]').forEach(btn => {
            btn.addEventListener('click', () => {
                if (window.innerWidth <= 768) closeSidebar();
            });
        });
    </script>
</body>

</html>
